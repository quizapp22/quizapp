function getDeviceId(){
  let did = localStorage.getItem('dq_device_id');
  if(did) return did;
  const raw = [navigator.userAgent, navigator.language, screen.width + 'x' + screen.height, screen.colorDepth, new Date().getTimezoneOffset(), navigator.hardwareConcurrency||'', navigator.platform||''].join('|');
  let h=0;
  for(let i=0;i<raw.length;i++){ h=Math.imul(31,h)+raw.charCodeAt(i)|0; }
  did = 'D' + Math.abs(h).toString(36).toUpperCase().padStart(8,'0');
  localStorage.setItem('dq_device_id', did);
  return did;
}

async function refreshUnlockedSubjects(){
  if(!ST._allowedFacs || ST._allowedFacs.length===0) return;
  for(const facId of ST._allowedFacs){
    let query = `faculty_id=eq.${facId}&is_active=eq.true&select=id,semester,year`;
    if(ST._allowedYear) query += `&year=eq.${ST._allowedYear}`;
    if(ST._allowedSems) query += `&semester=eq.${ST._allowedSems}`;
    const subs = await sbGet('subjects', query);
    subs.forEach(s=>{
      if(!ST.userSubjs.includes(s.id)) ST.userSubjs.push(s.id);
    });
  }
}

/* ══ SUBJECTS (مع إضافة عدد الدورات) ══ */
async function goSubjects(){
  if(!ST.selFac)return;
  const f=ST.faculties.find(x=>x.id===ST.selFac);
  document.getElementById('facLabel').textContent=f?.name||'المواد';
  show('s-subjects');
  document.getElementById('subjList').innerHTML='<div class="spin"></div>';
  ST.subjects=await sbGet('subjects',`faculty_id=eq.${ST.selFac}&is_active=eq.true&order=year,semester,specialization,name`);
  
  // جلب جميع الدورات لهذه الكلية لتجميعها حسب المادة
  const subjIds = ST.subjects.map(s=>s.id).join(',');
  if(subjIds){
    try{
      const allSessions = await sbGet('exam_sessions',`subject_id=in.(${subjIds})&is_active=eq.true&select=id,subject_id,year,semester,is_free`);
      ST._sessionsBySubject = {};
      allSessions.forEach(sess=>{
        if(!ST._sessionsBySubject[sess.subject_id]) ST._sessionsBySubject[sess.subject_id]=[];
        ST._sessionsBySubject[sess.subject_id].push(sess);
      });
      // تخزين الدورات المجانية أيضاً للـ badge
      ST._freeSessions = allSessions.filter(s=>s.is_free===true);
    }catch(e){ ST._sessionsBySubject={}; ST._freeSessions=[]; }
  } else { ST._sessionsBySubject={}; ST._freeSessions=[]; }
  
  ST.selSubj=null;ST.selYear='all';
  buildYearPills();renderSubjects();bon('btnSubj',false);
}

function renderSubjects(){
  let s=ST.subjects;
  if(ST.selYear!=='all') s=s.filter(x=>x.year===ST.selYear);
  const semVal = document.getElementById('semFilter')?.value||'';
  if(semVal) s=s.filter(x=>String(x.semester)===semVal);
  const specVal = document.getElementById('specFilter')?.value||'';
  if(specVal) s=s.filter(x=>x.specialization===specVal);
  const searchVal = (document.getElementById('subjSearch')?.value||'').trim().toLowerCase();
  if(searchVal) s=s.filter(x=>x.name.toLowerCase().includes(searchVal));

  const list=document.getElementById('subjList');
  if(!s.length){
    list.innerHTML=`<div style="text-align:center;padding:40px;color:var(--textdim)">...</div>`;
    return;
  }

  list.innerHTML=s.map(x=>{
    const codeUnlocked = isSubjUnlocked(x);
    const hasFreeSession = (ST._freeSessions||[]).some(sess=>sess.subject_id===x.id);
    const sessionsList = ST._sessionsBySubject[x.id] || [];
    const sessionCount = sessionsList.length;
    // بناء نص عرض الدورات
    let sessionsBadge = '';
    if(sessionCount>0){
      const sessionSummary = sessionsList.map(s=>`${s.year} ${SEM_N[s.semester]}`).join('، ');
      sessionsBadge = `<span class="tag t-gold" title="${sessionSummary}">📅 ${sessionCount} ${sessionCount==1?'دورة':'دورات'}</span>`;
    }
    const statusBadge = codeUnlocked
      ? `<span class="badge-free">✓ مفتوح</span>`
      : hasFreeSession
        ? `<span class="badge-free" style="background:var(--bluedim);color:var(--blue);border-color:rgba(74,143,255,.25)">🆓 دورات مجانية</span>`
        : `<span class="badge-locked">🔒 يحتاج كود</span>`;
    return `
    <div class="subj-card" id="sj-${x.id}" onclick="selSubj('${x.id}',this)">
      <div class="subj-ico">${x.icon||'📖'}</div>
      <div style="flex:1">
        <div class="subj-name">${x.name}</div>
        <div style="font-size:10.5px;color:var(--textdim);margin-top:1px;margin-bottom:4px">${ST.faculties.find(f=>f.id===x.faculty_id)?.name||''}</div>
        <div class="subj-tags">
          <span class="tag t-blue">السنة ${x.year}</span>
          ${x.semester?`<span class="tag t-gold">${SEM_SUBJ[x.semester]||''}</span>`:''}
          ${x.specialization?`<span class="tag" style="background:var(--purpledim);color:var(--purple);border:1px solid rgba(168,85,247,.2)">${x.specialization}</span>`:''}
          ${sessionsBadge}
          ${statusBadge}
        </div>
      </div>
      <div style="font-size:15px;color:var(--textdim);transform:rotate(180deg)">◀</div>
    </div>`;
  }).join('');
}

/* ══ CHECK UNLOCK ══ */
function isSubjUnlocked(subj){
  if(!subj) return false;
  if(ST.userSubjs.includes('all')) return true;
  if(ST.userSubjs.includes('all_in_fac')){
    if(ST._allowedFacs && ST._allowedFacs.includes(subj.faculty_id)){
      if(ST._allowedSems && subj.semester !== ST._allowedSems) return false;
      if(ST._allowedYear && subj.year !== ST._allowedYear) return false;
      return true;
    }
    return false;
  }
  return ST.userSubjs.includes(subj.id);
}
function isSessUnlocked(sess){
  if(!sess) return false;
  if(sess.is_free === true || sess.is_free === 'true') return true;
  const subj = ST.subjects.find(s=>s.id===sess.subject_id);
  return isSubjUnlocked(subj);
}
